<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phonk Visuals Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --panel: #101010;
      --panel-2: #151515;
      --text: #e8e8e8;
      --muted: #9a9a9a;
      --faint: #666;
      --line: #303030;
      --line-2: #1f1f1f;
      --white: #f5f5f5;
      --black: #000;
      --shadow-line: #303030;
    }

    body.theme-light {
      --bg: #f3f3f3;
      --panel: #ffffff;
      --panel-2: #eeeeee;
      --text: #121212;
      --muted: #555;
      --faint: #888;
      --line: #cfcfcf;
      --line-2: #dedede;
      --white: #000;
      --black: #fff;
      --shadow-line: #cfcfcf;
    }

    body.theme-dark {
      --bg: #080808;
      --panel: #101010;
      --panel-2: #151515;
      --text: #e8e8e8;
      --muted: #9a9a9a;
      --faint: #666;
      --line: #303030;
      --line-2: #1f1f1f;
      --white: #f5f5f5;
      --black: #000;
      --shadow-line: #303030;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Red Hat Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      color: var(--text);
      background: var(--bg);
      padding: 18px;
      font-size: 13px;
      line-height: 1.45;
    }

    .app {
      width: min(1680px, 100%);
      margin: 0 auto;
    }

    .hero {
      position: relative;
      min-height: 76px;
      background: transparent;
      border-bottom: 1px solid var(--line);
      padding: 18px 0 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    h1 {
      font-size: clamp(24px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -2px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
    }



    .site-logo,
    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      text-decoration: none;
      color: var(--white);
    }

    .brand-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .site-logo {
      margin: 0;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .logo-img {
      display: block;
      width: clamp(160px, 18vw, 260px);
      height: auto;
      max-height: 64px;
      object-fit: contain;
      filter: invert(1);
    }

    body.theme-light .logo-img { filter: none; }

    .auth-panel .logo-img {
      width: min(260px, 82vw);
      margin: 0 auto 14px;
    }

    .logo-img.is-hidden { display: none; }

    .logo-fallback {
      display: none;
      font-size: clamp(24px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -2px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
    }

    .auth-panel .logo-fallback {
      font-size: clamp(24px, 5vw, 38px);
      margin-bottom: 14px;
    }

    .logo-fallback.is-visible { display: inline-block; }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
      z-index: 3;
    }


    .mobile-nav-toggle {
      display: none;
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      border-radius: 0;
      align-items: center;
      justify-content: center;
      padding: 0;
      z-index: 1001;
    }

    .mobile-nav-toggle:hover,
    .mobile-nav-toggle.is-open {
      border-color: var(--white);
      color: var(--white);
      background: var(--panel-2);
    }

    .mobile-nav-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      transition: transform 180ms ease;
    }

    .mobile-nav-toggle.is-open svg {
      transform: rotate(180deg);
    }


    .mobile-ui-backdrop {
      position: fixed;
      inset: 0;
      z-index: 997;
      display: none;
      background: rgba(0,0,0,0.58);
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      transition: opacity 180ms ease, backdrop-filter 180ms ease, -webkit-backdrop-filter 180ms ease;
    }

    body.theme-light .mobile-ui-backdrop { background: rgba(0,0,0,0.38); }

    body.mobile-nav-active .mobile-ui-backdrop {
      display: block;
      opacity: 1;
      pointer-events: auto;
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
    }

    .nav-btn,
    .auth-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 8px 4px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;
      white-space: nowrap;
      letter-spacing: 0.7px;
      text-decoration: none;
    }

    .nav-btn:hover,
    .nav-btn.active,
    .auth-btn:hover { color: var(--white); background: transparent; }

    main {
      display: grid;
      grid-template-columns: 1fr 1.05fr;
      gap: 10px;
      align-items: start;
    }

    @media (max-width: 920px) { main { grid-template-columns: 1fr; } }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .card:hover { border-color: var(--white); background: var(--panel-2); }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--muted);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 0;
      background: var(--black);
      color: var(--text);
      padding: 10px;
      outline: none;
      font-family: inherit;
      font-size: 12px;
    }

    input::placeholder, textarea::placeholder { color: var(--faint); }
    option { color: var(--text); background: var(--black); }
    input:focus, select:focus, textarea:focus { border-color: var(--white); background: var(--black); }

    .field {
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line-2);
      padding-bottom: 14px;
    }

    .field:last-child { border-bottom: 0; padding-bottom: 0; }

    .hint {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .mini-label {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .preset-grid, .weapon-grid, .material-grid, .ratio-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .preset-grid { grid-template-columns: repeat(4, 1fr); }
    .weapon-grid { grid-template-columns: repeat(3, 1fr); }
    .material-grid { grid-template-columns: repeat(3, 1fr); }
    .ratio-grid { grid-template-columns: repeat(4, 1fr); }

    @media (max-width: 560px) {
      .preset-grid, .weapon-grid, .material-grid, .ratio-grid { grid-template-columns: repeat(2, 1fr); }
    }

    button, .preset-btn, .weapon-btn, .material-btn, .toggle-btn, .ratio-btn {
      font-family: inherit;
      border-radius: 0;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .preset-btn, .weapon-btn, .material-btn, .toggle-btn, .ratio-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid var(--line);
      background: var(--black);
      color: var(--text);
      padding: 10px;
      text-align: center;
      font-size: 11px;
    }

    .preset-btn:hover, .weapon-btn:hover, .material-btn:hover, .toggle-btn:hover, .ratio-btn:hover {
      border-color: var(--white);
      color: var(--white);
      background: var(--panel-2);
      transform: translateY(-1px);
    }

    .preset-btn.active, .weapon-btn.active, .material-btn.active, .toggle-btn.active, .ratio-btn.active {
      border-color: var(--white);
      background: var(--white);
      color: var(--black);
      box-shadow: 4px 4px 0 var(--shadow-line);
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 10px;
      align-items: center;
    }

    .color-btn {
      width: 30px;
      height: 30px;
      min-width: 30px;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0;
      background: var(--swatch);
      color: transparent;
      box-shadow: none;
      overflow: hidden;
      text-indent: -999px;
    }

    .color-btn:hover {
      filter: none;
      border-color: var(--white);
      outline: 2px solid var(--white);
      outline-offset: 2px;
      transform: translateY(-1px);
    }

    .color-btn.active {
      border-color: var(--white);
      outline: 2px solid var(--white);
      outline-offset: 2px;
      box-shadow: 0 0 0 1px var(--black);
    }

    .custom-input { margin-top: 10px; }

    .toggle-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .title-panel, .flame-panel, .flame-accent-panel, .other-subject-panel, .holding-panel, .custom-weapon-panel {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--black);
    }

    .title-panel.show, .flame-panel.show, .flame-accent-panel.show, .other-subject-panel.show, .holding-panel.show, .custom-weapon-panel.show { display: block; }

    .text-controls, .three-controls {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .text-controls { grid-template-columns: 1fr 1fr; }
    .three-controls { grid-template-columns: 1fr 1fr 1fr; }

    @media (max-width: 620px) { .text-controls, .three-controls { grid-template-columns: 1fr; } }

    .ratio-btn { flex-direction: column; gap: 7px; min-height: 72px; }
    .ratio-icon { display: grid; place-items: center; border: 2px solid currentColor; border-radius: 0; opacity: 0.95; }
    .ratio-1-1 { width: 24px; height: 24px; }
    .ratio-16-9 { width: 34px; height: 19px; }
    .ratio-4-5 { width: 24px; height: 30px; }
    .ratio-9-16 { width: 20px; height: 36px; }
    .ratio-text { font-size: 13px; font-weight: 800; }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .generate, .copy {
      border: 1px solid var(--white);
      padding: 14px 16px;
      font-family: inherit;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;
    }

    .generate {
      background: var(--white);
      color: var(--black);
      box-shadow: 6px 6px 0 var(--shadow-line);
    }

    .copy {
      border-color: var(--line);
      background: var(--black);
      color: var(--text);
    }

    .generate:hover, .copy:hover {
      background: var(--black);
      color: var(--white);
      border-color: var(--white);
      box-shadow: none;
      filter: none;
    }

    .output-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .copied {
      min-height: 20px;
      color: var(--white);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    textarea {
      min-height: 720px;
      resize: vertical;
      line-height: 1.55;
    }



    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      text-transform: uppercase;
      padding: 36px 18px 26px;
      margin-top: 18px;
      border-top: 1px solid var(--line-2);
    }

    @media (max-width: 760px) {
      body { padding: 10px; }
      .hero {
        min-height: 66px;
        padding: 14px 0;
        justify-content: flex-end;
        align-items: center;
      }
      .brand-logo,
      .site-logo {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      .logo-img { width: min(190px, 58vw); max-height: 44px; }
      .mobile-nav-toggle { display: inline-flex; }
      .hero-actions {
        position: fixed;
        top: 76px;
        right: 10px;
        z-index: 998;
        width: min(320px, calc(100vw - 20px));
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 10px;
        background: rgba(16,16,16,0.96);
        border: 1px solid var(--line);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px) scale(0.98);
        transform-origin: top right;
        transition: opacity 180ms ease, transform 180ms ease;
      }
      body.theme-light .hero-actions { background: rgba(255,255,255,0.96); }
      body.mobile-nav-active .hero-actions {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }
      .hero .auth-btn, .hero .nav-btn {
        width: 100%;
        text-align: left;
        padding: 12px 10px;
      }
      .sidebar-toggle-btn {
        display: none !important;
      }
      .left-sidebar, .left-sidebar-overlay {
        display: none !important;
      }
    }

    /* Left Sidebar Styles */
    .icon-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      background: var(--black);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
    }
    .icon-btn:hover {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }
    .sidebar-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      border-radius: 0;
      padding: 0;
      z-index: 1001;
      margin-right: auto;
      transition: background 180ms ease, border-color 180ms ease, opacity 180ms ease;
    }
    .sidebar-toggle-btn:hover {
      background: var(--line);
      color: var(--white);
    }
    body.left-sidebar-active .sidebar-toggle-btn {
      opacity: 0;
      pointer-events: none;
    }
    .left-sidebar-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.72);
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      transition: opacity 280ms cubic-bezier(0.16, 1, 0.3, 1), backdrop-filter 280ms cubic-bezier(0.16, 1, 0.3, 1), -webkit-backdrop-filter 280ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.theme-light .left-sidebar-overlay {
      background: rgba(0,0,0,0.46);
    }
    .left-sidebar-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .left-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 340px;
      z-index: 1000;
      background: var(--panel);
      border-right: 1px solid var(--line);
      transform: translateX(-100%);
      transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      padding: 20px;
    }
    .left-sidebar.is-open {
      transform: translateX(0);
    }
    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .sidebar-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    body.theme-light .sidebar-header h2 {
      color: var(--black);
    }
    .sidebar-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: auto;
      min-height: 0;
    }
    .sidebar-links-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .sidebar-link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--black);
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }
    .sidebar-link-btn:hover {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
      transform: translateY(-1px);
    }
    .sidebar-footer, .sidebar-edit-footer {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: flex;
      gap: 10px;
    }
    .footer-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.5px;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }
    .footer-btn:hover {
      background: var(--line);
      color: var(--white);
    }
    .footer-btn.save-btn {
      border-color: var(--white);
      color: var(--white);
    }
    body.theme-light .footer-btn.save-btn {
      border-color: var(--black);
      color: var(--black);
    }
    .edit-links-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      overflow-y: auto;
      flex: 1;
    }
    .edit-link-row-vertical {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      position: relative;
    }
    body.theme-light .edit-link-row-vertical {
      background: rgba(0, 0, 0, 0.02);
    }
    .edit-link-row-vertical .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #ff5555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      padding: 0;
    }
    .edit-link-row-vertical input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
    }
    .add-new-link-section {
      margin-top: auto;
      padding: 14px;
      border: 1px dashed var(--line);
      margin-bottom: 16px;
      background: rgba(255,255,255,0.01);
    }
    body.theme-light .add-new-link-section {
      background: rgba(0,0,0,0.01);
    }
    .add-new-link-section h3 {
      margin: 0 0 12px 0;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .add-link-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .add-link-form input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
    }
    .add-link-form button {
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      transition: background 160ms ease, color 160ms ease;
    }
    .add-link-form button:hover {
      background: var(--line);
      color: var(--white);
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="theme-dark">
  <!-- Left Sidebar Elements -->
  <div class="left-sidebar-overlay" id="leftSidebarOverlay" onclick="closeLeftSidebar()"></div>
  <aside class="left-sidebar" id="leftSidebar">
    <div class="sidebar-header">
      <h2>External</h2>
      <span class="sidebar-save-status" id="sidebarSaveStatus" style="font-size: 10px; color: var(--faint); margin-left: 10px; text-transform: uppercase;"></span>
    </div>
    
    <div class="sidebar-content">
      <!-- View Mode -->
      <div class="sidebar-view-mode" id="sidebarViewMode">
        <div class="sidebar-links-list" id="sidebarLinksList">
          <!-- Dynamic Links -->
        </div>
        <div class="sidebar-footer">
          <button class="footer-btn" onclick="enterSidebarEditMode()">✎ Edit Links</button>
        </div>
      </div>

      <!-- Edit Mode -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB4mAggiPorQdcnMrvox8t6ZNxF7o1C98o",
      authDomain: "druskhi-outreach-dashboard.firebaseapp.com",
      projectId: "druskhi-outreach-dashboard",
      storageBucket: "druskhi-outreach-dashboard.firebasestorage.app",
      messagingSenderId: "375387055106",
      appId: "1:375387055106:web:68ab3ab1f9bd796f85b31b"
    };

    const FIREBASE_ENABLED = !firebaseConfig.apiKey.includes("PASTE_");
    let firebaseApp = null;
    let firebaseAuth = null;
    let firebaseProvider = null;
    let firebaseDb = null;
    let firebaseDocRef = null;
    let firebaseOnline = false;
    let isCloudLoaded = false;
    let unsubscribeRealtime = null;

    const DEFAULT_SIDEBAR_LINKS = [
      { label: "Discord", url: "https://discord.com/channels/@me" },
      { label: "Sonauto", url: "https://sonauto.ai/create" },
      { label: "Gemini", url: "https://gemini.google.com/app" },
      { label: "ChatGPT", url: "https://chatgpt.com/" },
      { label: "Lalal", url: "https://www.lalal.ai/" },
      { label: "Cosmos", url: "https://www.cosmos.so/" },
      { label: "Pinterest", url: "https://www.pinterest.com/" },
      { label: "Gmail", url: "https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox" },
      { label: "Random String", url: "https://pinetools.com/random-string-generator" },
      { label: "Audio-Video", url: "https://www.onlineconverter.com/audio-to-video" }
    ];

    let sidebarLinks = [];

    function escapeHtml(value) {
      return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function setAuthButton(isSignedIn) {
      const authBtn = document.getElementById("authBtn");
      if (!authBtn) return;
      authBtn.textContent = isSignedIn ? "Sign out" : "Sign in Google";
      authBtn.setAttribute("aria-label", isSignedIn ? "Sign out of Google" : "Sign in with Google");
    }

    async function initFirebaseAuth() {
      if (!FIREBASE_ENABLED) {
        setAuthButton(false);
        sidebarLinks = JSON.parse(JSON.stringify(DEFAULT_SIDEBAR_LINKS));
        renderSidebarLinks();
        return;
      }

      try {
        firebaseApp = initializeApp(firebaseConfig);
        firebaseAuth = getAuth(firebaseApp);
        firebaseProvider = new GoogleAuthProvider();
        firebaseDb = getFirestore(firebaseApp);

        onAuthStateChanged(firebaseAuth, async user => {
          setAuthButton(Boolean(user));
          if (!user) {
            firebaseDocRef = null;
            firebaseOnline = false;
            isCloudLoaded = false;
            if (unsubscribeRealtime) {
              unsubscribeRealtime();
              unsubscribeRealtime = null;
            }
            sidebarLinks = JSON.parse(JSON.stringify(DEFAULT_SIDEBAR_LINKS));
            renderSidebarLinks();
            return;
          }

          firebaseDocRef = doc(firebaseDb, "dashboards", "druskhi-outreach");
          firebaseOnline = true;
          
          // Load initially
          try {
            const snap = await getDoc(firebaseDocRef);
            if (snap.exists()) {
              const cloud = snap.data();
              const cloudSidebarLinks = Array.isArray(cloud.sidebarLinks_v2) 
                ? cloud.sidebarLinks_v2 
                : (Array.isArray(cloud.sidebarLinks) ? cloud.sidebarLinks : null);
              if (cloudSidebarLinks) {
                sidebarLinks = cloudSidebarLinks;
              } else {
                sidebarLinks = JSON.parse(JSON.stringify(DEFAULT_SIDEBAR_LINKS));
              }
            } else {
              sidebarLinks = JSON.parse(JSON.stringify(DEFAULT_SIDEBAR_LINKS));
            }
            renderSidebarLinks();
            isCloudLoaded = true;
          } catch (e) {
            console.error("Initial load of sidebar links failed", e);
            sidebarLinks = JSON.parse(JSON.stringify(DEFAULT_SIDEBAR_LINKS));
            renderSidebarLinks();
          }

          setupRealtimeSync();
        });
      } catch (error) {
        console.error("Firebase auth init failed", error);
        setAuthButton(false);
        sidebarLinks = JSON.parse(JSON.stringify(DEFAULT_SIDEBAR_LINKS));
        renderSidebarLinks();
      }
    }

    function setupRealtimeSync() {
      if (!firebaseDb || !firebaseDocRef) return;
      if (unsubscribeRealtime) unsubscribeRealtime();

      unsubscribeRealtime = onSnapshot(firebaseDocRef, (snap) => {
        if (!snap.exists()) return;
        const cloud = snap.data();
        const cloudSidebarLinks = Array.isArray(cloud.sidebarLinks_v2)
          ? cloud.sidebarLinks_v2
          : (Array.isArray(cloud.sidebarLinks) ? cloud.sidebarLinks : null);

        if (Array.isArray(cloudSidebarLinks)) {
          sidebarLinks = cloudSidebarLinks;
        }

        if (!isUserInteracting()) {
          hasPendingUpdate = false;
          renderSidebarLinks();
        } else {
          hasPendingUpdate = true;
          const statusText = document.getElementById("sidebarSaveStatus");
          if (statusText) statusText.textContent = "Updates pending...";
        }
      }, (error) => {
        console.error("Realtime sync failed", error);
      });
    }

    let hasPendingUpdate = false;

    function isUserInteracting() {
      const activeEl = document.activeElement;
      const isTyping = activeEl && (activeEl.tagName === "INPUT" || activeEl.tagName === "TEXTAREA" || activeEl.tagName === "SELECT");
      const isEditingSidebarLinks = !document.getElementById("sidebarEditMode")?.classList.contains("hidden");
      const isSidebarOpen = document.getElementById("leftSidebar")?.classList.contains("is-open");
      return !!(isTyping || isEditingSidebarLinks || isSidebarOpen);
    }

    function applyPendingUpdatesIfNeeded() {
      if (hasPendingUpdate && !isUserInteracting()) {
        hasPendingUpdate = false;
        const statusText = document.getElementById("sidebarSaveStatus");
        if (statusText && statusText.textContent === "Updates pending...") statusText.textContent = "";
        renderSidebarLinks();
      }
    }

    async function toggleAuth() {
      if (!FIREBASE_ENABLED || !firebaseAuth || !firebaseProvider) {
        alert("Firebase sign-in is not ready. Check the Firebase config.");
        return;
      }

      try {
        if (firebaseAuth.currentUser) {
          await signOut(firebaseAuth);
        } else {
          await signInWithPopup(firebaseAuth, firebaseProvider);
        }
      } catch (error) {
        console.error("Auth failed", error);
        alert("Firebase sign-in failed. Check authorized domains and popup permissions.");
      }
    }

    function openLeftSidebar() {
      document.getElementById("leftSidebar")?.classList.add("is-open");
      document.getElementById("leftSidebarOverlay")?.classList.add("is-open");
      document.body.classList.add("left-sidebar-active");
    }

    function closeLeftSidebar() {
      const sidebar = document.getElementById("leftSidebar");
      const wasOpen = sidebar && sidebar.classList.contains("is-open");
      sidebar?.classList.remove("is-open");
      document.getElementById("leftSidebarOverlay")?.classList.remove("is-open");
      document.body.classList.remove("left-sidebar-active");
      exitSidebarEditMode();
      applyPendingUpdatesIfNeeded();
      if (wasOpen) {
        playAudio("close");
      }
    }

    function renderSidebarLinks() {
      const viewList = document.getElementById("sidebarLinksList");
      const editList = document.getElementById("sidebarEditLinksContainer");
      if (!viewList) return;

      viewList.innerHTML = sidebarLinks.map(link => `
        <a class="sidebar-link-btn" href="${escapeHtml(link.url)}" target="_blank" rel="noreferrer">
          <span>${escapeHtml(link.label)}</span>
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;fill:none;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      `).join("");

      if (editList) {
        editList.innerHTML = sidebarLinks.map((link, index) => `
          <div class="edit-link-row-vertical" data-index="${index}">
            <button class="remove-btn" type="button" title="Remove Link" onclick="removeSidebarLink(${index})">✕</button>
            <div style="display:flex; flex-direction:column; gap:4px;">
              <span style="font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase;">Name</span>
              <input type="text" class="sidebar-link-label-input" value="${escapeHtml(link.label)}" placeholder="Link Name" />
            </div>
            <div style="display:flex; flex-direction:column; gap:4px;">
              <span style="font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase;">URL</span>
              <input type="url" class="sidebar-link-url-input" value="${escapeHtml(link.url)}" placeholder="Link URL" />
            </div>
          </div>
        `).join("");
      }
    }

    function enterSidebarEditMode() {
      document.getElementById("sidebarViewMode")?.classList.add("hidden");
      document.getElementById("sidebarEditMode")?.classList.remove("hidden");
      renderSidebarLinks();
    }

    function exitSidebarEditMode() {
      document.getElementById("sidebarEditMode")?.classList.add("hidden");
      document.getElementById("sidebarViewMode")?.classList.remove("hidden");
      
      const newLabel = document.getElementById("newSidebarLinkLabel");
      const newUrl = document.getElementById("newSidebarLinkUrl");
      if (newLabel) newLabel.value = "";
      if (newUrl) newUrl.value = "";
      
      renderSidebarLinks();
      applyPendingUpdatesIfNeeded();
    }

    function removeSidebarLink(index) {
      const row = document.querySelector(`.edit-link-row-vertical[data-index="${index}"]`);
      if (row) {
        row.remove();
      }
    }

    function addSidebarLinkFromForm() {
      const labelInput = document.getElementById("newSidebarLinkLabel");
      const urlInput = document.getElementById("newSidebarLinkUrl");
      const label = labelInput ? labelInput.value.trim() : "";
      const url = urlInput ? urlInput.value.trim() : "";
      
      if (!label || !url) {
        alert("Please enter both Name and URL.");
        return;
      }

      const editList = document.getElementById("sidebarEditLinksContainer");
      if (!editList) return;

      const index = editList.querySelectorAll(".edit-link-row-vertical").length;
      const row = document.createElement("div");
      row.className = "edit-link-row-vertical";
      row.setAttribute("data-index", index);
      row.innerHTML = `
        <button class="remove-btn" type="button" title="Remove Link" onclick="removeSidebarLink(${index})">✕</button>
        <div style="display:flex; flex-direction:column; gap:4px;">
          <span style="font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase;">Name</span>
          <input type="text" class="sidebar-link-label-input" value="${escapeHtml(label)}" placeholder="Link Name" />
        </div>
        <div style="display:flex; flex-direction:column; gap:4px;">
          <span style="font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase;">URL</span>
          <input type="url" class="sidebar-link-url-input" value="${escapeHtml(url)}" placeholder="Link URL" />
        </div>
      `;
      editList.appendChild(row);
      
      labelInput.value = "";
      urlInput.value = "";
    }

    async function saveSidebarLinks() {
      const editList = document.getElementById("sidebarEditLinksContainer");
      if (!editList) return;
      
      const rows = editList.querySelectorAll(".edit-link-row-vertical");
      const newLinks = [];
      rows.forEach(row => {
        const label = row.querySelector(".sidebar-link-label-input").value.trim();
        const url = row.querySelector(".sidebar-link-url-input").value.trim();
        if (label && url) {
          newLinks.push({ label, url });
        }
      });

      const addNameInput = document.getElementById("newSidebarLinkLabel");
      const addUrlInput = document.getElementById("newSidebarLinkUrl");
      const addName = addNameInput ? addNameInput.value.trim() : "";
      const addUrl = addUrlInput ? addUrlInput.value.trim() : "";
      if (addName && addUrl) {
        newLinks.push({ label: addName, url: addUrl });
        if (addNameInput) addNameInput.value = "";
        if (addUrlInput) addUrlInput.value = "";
      }

      sidebarLinks = newLinks;
      exitSidebarEditMode();

      if (firebaseOnline && firebaseDocRef) {
        try {
          const statusText = document.getElementById("sidebarSaveStatus");
          if (statusText) statusText.textContent = "Saving...";
          await setDoc(firebaseDocRef, {
            sidebarLinks_v2: newLinks,
            updatedAt: serverTimestamp()
          }, { merge: true });
          if (statusText) statusText.textContent = "Saved";
          setTimeout(() => {
            if (statusText && statusText.textContent === "Saved") statusText.textContent = "";
          }, 3000);
        } catch (error) {
          console.error("Firebase sidebar links save failed", error);
          const statusText = document.getElementById("sidebarSaveStatus");
          if (statusText) statusText.textContent = "Error";
        }
      }
    }

    function closeMobileNav() {
      document.body.classList.remove('mobile-nav-active');
      const button = document.getElementById('mobileNavToggle');
      if (button) {
        button.classList.remove('is-open');
        button.setAttribute('aria-expanded', 'false');
        button.setAttribute('aria-label', 'Open navigation');
      }
    }

    function closeMobileOverlays() {
      closeMobileNav();
      closeLeftSidebar();
    }

    function toggleMobileNav() {
      const isOpen = !document.body.classList.contains('mobile-nav-active');
      document.body.classList.toggle('mobile-nav-active', isOpen);
      const button = document.getElementById('mobileNavToggle');
      if (button) {
        button.classList.toggle('is-open', isOpen);
        button.setAttribute('aria-expanded', String(isOpen));
        button.setAttribute('aria-label', isOpen ? 'Close navigation' : 'Open navigation');
      }
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeMobileOverlays();
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 760) closeMobileOverlays();
    });

    document.addEventListener("focusout", () => {
      setTimeout(applyPendingUpdatesIfNeeded, 100);
    });

    window.toggleAuth = toggleAuth;
    window.toggleMobileNav = toggleMobileNav;
    window.closeMobileNav = closeMobileNav;
    window.closeMobileOverlays = closeMobileOverlays;
    window.openLeftSidebar = openLeftSidebar;
    window.closeLeftSidebar = closeLeftSidebar;
    window.enterSidebarEditMode = enterSidebarEditMode;
    window.exitSidebarEditMode = exitSidebarEditMode;
    window.removeSidebarLink = removeSidebarLink;
    window.addSidebarLinkFromForm = addSidebarLinkFromForm;
    window.saveSidebarLinks = saveSidebarLinks;

    // Global UI Audio Feedback Manager
    const AUDIO_FILES = {
      click: new Audio('/assets/audio/btn-click.ogg'),
      hover: new Audio('/assets/audio/hover.ogg'),
      close: new Audio('/assets/audio/window-closed.ogg')
    };

    // Preload audio files
    Object.values(AUDIO_FILES).forEach(audio => {
      audio.load();
    });

    function playAudio(type) {
      const audio = AUDIO_FILES[type];
      if (!audio) return;
      try {
        audio.currentTime = 0;
        audio.play().catch(err => {
          console.debug(`Audio play failed for ${type}:`, err);
        });
      } catch (err) {
        console.debug(`Audio play failed for ${type}:`, err);
      }
    }
    window.playAudio = playAudio;

    function isCloseAction(element) {
      if (!element) return false;
      if (element.id === 'addArtistModal' || element.id === 'addUserModal' || element.id === 'slideUpModal' || element.id === 'leftSidebarOverlay') {
        return true;
      }
      if (element.classList.contains('close-btn')) {
        return true;
      }
      if (element.getAttribute('title') === 'Close') {
        return true;
      }
      const onclickAttr = element.getAttribute('onclick');
      if (onclickAttr && (
          onclickAttr.includes('closeSlideUpPanel') || 
          onclickAttr.includes('closeAddArtistModal') || 
          onclickAttr.includes('closeAddUserModal') || 
          onclickAttr.includes('closeLeftSidebar')
      )) {
        return true;
      }
      return false;
    }

    // Delegated click audio trigger (using capture phase to bypass stopPropagation)
    const clickableSelector = 'a, button, [role="button"], .card, .card-back, .color-code-btn, .summary-globe-btn, .preset-btn, .weapon-btn, .material-btn, .toggle-btn, .ratio-btn, .color-btn, .generate, .copy, .icon-btn, .mobile-nav-toggle, .mobile-filter-toggle, .remove-btn';
    
    document.addEventListener('click', event => {
      const clickable = event.target.closest(clickableSelector);
      if (clickable) {
        if (isCloseAction(clickable)) {
          return;
        }
        playAudio('click');
      }
    }, true);

    // Delegated hover audio trigger (using capture phase)
    const hoverableSelector = 'a, button, [role="button"], .nav-btn, .auth-btn, .card, .card-back, .color-code-btn, .delete-artist-btn, .add-artist-btn, .mobile-filter-toggle, .summary-globe-btn, .send-remove-btn, .send-add-btn, .show-send-all, .visual-card, .horizontal-user-card, .action-link-btn, .sidebar-toggle-btn, .sidebar-link-btn, .footer-btn, .preset-btn, .weapon-btn, .material-btn, .toggle-btn, .ratio-btn, .color-btn, .generate, .copy, .icon-btn, .mobile-nav-toggle, .mobile-filter-toggle, .remove-btn, .close-btn';
    
    let lastHoveredElement = null;

    document.addEventListener('mouseover', event => {
      const hoverable = event.target.closest(hoverableSelector);
      if (hoverable) {
        if (lastHoveredElement !== hoverable) {
          lastHoveredElement = hoverable;
          playAudio('hover');
        }
      } else {
        lastHoveredElement = null;
      }
    }, true);

    document.addEventListener('mouseout', event => {
      if (lastHoveredElement && !event.relatedTarget?.closest(hoverableSelector)) {
        lastHoveredElement = null;
      }
    }, true);

    setAuthButton(false);
    initFirebaseAuth();
  </script>

  <script>
    const output = document.getElementById('output');
    const copied = document.getElementById('copied');
    const THEME_KEY = 'artistOutreachDashboard.theme.v1';

    function getSystemTheme() {
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyThemePreference(preference) {
      const resolvedTheme = preference === 'system' ? getSystemTheme() : preference;
      document.body.classList.remove('theme-light', 'theme-dark');
      document.body.classList.add(resolvedTheme === 'light' ? 'theme-light' : 'theme-dark');
    }

    function loadThemePreference() {
      return localStorage.getItem(THEME_KEY) || 'system';
    }

    function changeTheme(value) {
      localStorage.setItem(THEME_KEY, value);
      applyThemePreference(value);
    }

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if (loadThemePreference() === 'system') applyThemePreference('system');
      });
    }
    applyThemePreference(loadThemePreference());
    window.addEventListener('storage', event => {
      if (event.key === THEME_KEY) applyThemePreference(loadThemePreference());
    });

    let selectedRatio = '1:1';
    let selectedSubject = 'a powerful fantasy woman with glowing eyes';
    let selectedWeapon = 'a glowing sword';
    let selectedTitleType = 'flame';
    let flameEnabled = true;
    let flameAccentEnabled = true;
    let holdingEnabled = true;
    let titleEnabled = true;

    const swatches = [
      { name: 'red', value: '#ff2b2b' },
      { name: 'orange', value: '#ff7a18' },
      { name: 'yellow', value: '#ffe600' },
      { name: 'green', value: '#37ff6b' },
      { name: 'cyan', value: '#00eaff' },
      { name: 'blue', value: '#246bff' },
      { name: 'violet', value: '#8b35ff' },
      { name: 'pink', value: '#ff4fd8' },
      { name: 'white', value: '#f5f5f5' }
    ];

    function clean(value, fallback) {
      const text = String(value || '').trim();
      return text.length ? text : fallback;
    }

    function setActive(buttons, activeButton) {
      buttons.forEach(btn => btn.classList.remove('active'));
      activeButton.classList.add('active');
    }

    function buildColorGrid(gridId, inputId, defaultName) {
      const grid = document.getElementById(gridId);
      const input = document.getElementById(inputId);

      swatches.forEach(color => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'color-btn';
        button.dataset.color = color.name;
        button.title = color.name;
        button.style.setProperty('--swatch', color.value);
        button.textContent = color.name;

        if (color.name === defaultName) button.classList.add('active');

        button.addEventListener('click', () => {
          setActive(Array.from(grid.querySelectorAll('.color-btn')), button);
          input.value = color.name;
          generatePrompt();
        });

        grid.appendChild(button);
      });
    }

    function syncColorCustomInput(gridId, inputId) {
      const grid = document.getElementById(gridId);
      const input = document.getElementById(inputId);
      const normalized = input.value.trim().toLowerCase();
      grid.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color === normalized);
      });
    }

    function getSubject() {
      if (selectedSubject === 'custom') {
        return clean(document.getElementById('subject').value, 'a mysterious fantasy character with glowing eyes');
      }
      return selectedSubject;
    }

    function getWeaponPrompt() {
      if (!holdingEnabled) return '';
      if (selectedWeapon === 'custom') {
        return `, holding ${clean(document.getElementById('customWeapon').value, 'a crystal orb')}`;
      }
      return `, holding ${selectedWeapon}`;
    }

    function getTitleStyle() {
      const color = clean(document.getElementById('textColor').value, 'white neon');
      const texture = clean(document.getElementById('titleTexture').value, 'glowing molten neon');
      const fontMood = clean(document.getElementById('fontMood').value, 'bold high-impact display lettering');

      if (selectedTitleType === 'bubble') {
        return `${color} bubble liquid title, ${texture} texture, smooth rounded inflated letters, soft reflections, dimensional glossy edges, ${fontMood}`;
      }

      if (selectedTitleType === 'graffiti') {
        return `${color} graffiti style title, blocky bold letterforms, ${texture} texture, thick dimensional strokes, high-impact street lettering, ${fontMood}`;
      }

      return `${color} flame title, ${texture} texture, flowy liquid fiery flowing lettering, molten flame typography, smooth glowing text, ${fontMood}`;
    }

    function buildTextPrompt() {
      if (!titleEnabled) return '';

      const songTitle = String(document.getElementById('songTitle').value || '').trim();
      if (!songTitle) return '';

      const position = document.getElementById('textPosition').value;
      const layer = document.getElementById('textLayer').value;
      const titleStyle = getTitleStyle();

      return `, include the exact title text "${songTitle}" at the ${position}, ${layer}, ${titleStyle}, title matches the artwork style`;
    }

    function buildFlamePrompt() {
      if (!flameEnabled) return ', no flame aura';
      const flameColor = clean(document.getElementById('flameColor').value, 'blue');
      const flameAccentColor = clean(document.getElementById('flameAccentColor').value, 'pink');
      const flameColors = flameAccentEnabled ? `${flameColor} and ${flameAccentColor}` : flameColor;
      return `, soft ${flameColors} neon flame aura, glowing magical fire accents`;
    }

    function generatePrompt() {
      const mainColor = clean(document.getElementById('mainColor').value, 'red');
      const accentColor = clean(document.getElementById('accentColor').value, 'violet');
      const subject = getSubject();
      const weaponPrompt = getWeaponPrompt();
      const flamePrompt = buildFlamePrompt();
      const textPrompt = buildTextPrompt();

      const prompt = `${subject}${weaponPrompt}, vibrant neon fantasy anime artwork, ${mainColor} main color palette, ${accentColor} accent color lighting${flamePrompt}, glowing eyes, cinematic close-up, dramatic rim lighting, clean dark background, smooth energy glow, subtle sparks, light embers, saturated colors, high contrast shadows, glossy highlights, expressive face, detailed illustration, modern medieval fantasy atmosphere, polished digital painting, sharp focus, clean composition${textPrompt}, masterpiece, best quality, no shattered glass, no broken glass, no shards, no excessive particles, no clutter, no extra text unless title is enabled, no watermark, no logo, aspect ratio ${selectedRatio}`;

      output.value = prompt;
      copied.textContent = '';
    }

    async function copyPrompt() {
      if (!output.value.trim()) generatePrompt();

      try {
        await navigator.clipboard.writeText(output.value);
        copied.textContent = 'Copied!';
      } catch (error) {
        output.select();
        document.execCommand('copy');
        copied.textContent = 'Copied!';
      }

      setTimeout(() => copied.textContent = '', 1600);
    }

    document.querySelectorAll('.ratio-btn').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('.ratio-btn')), button);
        selectedRatio = button.dataset.ratio;
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-subject]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-subject]')), button);
        selectedSubject = button.dataset.subject;
        document.getElementById('otherSubjectPanel').classList.toggle('show', selectedSubject === 'custom');
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-weapon]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-weapon]')), button);
        selectedWeapon = button.dataset.weapon;
        document.getElementById('customWeaponPanel').classList.toggle('show', selectedWeapon === 'custom');
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-title-type]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-title-type]')), button);
        selectedTitleType = button.dataset.titleType;
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-toggle="holding"]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-toggle="holding"]')), button);
        holdingEnabled = button.dataset.value === 'on';
        document.getElementById('holdingPanel').classList.toggle('show', holdingEnabled);
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-toggle="flame"]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-toggle="flame"]')), button);
        flameEnabled = button.dataset.value === 'on';
        document.getElementById('flamePanel').classList.toggle('show', flameEnabled);
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-toggle="flameAccent"]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-toggle="flameAccent"]')), button);
        flameAccentEnabled = button.dataset.value === 'on';
        document.getElementById('flameAccentPanel').classList.toggle('show', flameAccentEnabled);
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-toggle="title"]').forEach(button => {
      button.addEventListener('click', () => {
        setActive(Array.from(document.querySelectorAll('[data-toggle="title"]')), button);
        titleEnabled = button.dataset.value === 'on';
        document.getElementById('titlePanel').classList.toggle('show', titleEnabled);
        generatePrompt();
      });
    });

    document.querySelectorAll('[data-texture]').forEach(button => {
      button.addEventListener('click', () => {
        document.getElementById('titleTexture').value = button.dataset.texture;
        setActive(Array.from(document.querySelectorAll('[data-texture]')), button);
        generatePrompt();
      });
    });

    buildColorGrid('mainColorGrid', 'mainColor', 'red');
    buildColorGrid('accentColorGrid', 'accentColor', 'violet');
    buildColorGrid('flameColorGrid', 'flameColor', 'blue');
    buildColorGrid('flameAccentColorGrid', 'flameAccentColor', 'pink');

    ['mainColor', 'accentColor', 'flameColor', 'flameAccentColor'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        syncColorCustomInput(id + 'Grid', id);
        generatePrompt();
      });
      document.getElementById(id).addEventListener('change', () => {
        syncColorCustomInput(id + 'Grid', id);
        generatePrompt();
      });
    });

    ['subject', 'customWeapon', 'songTitle', 'textPosition', 'textLayer', 'textColor', 'titleTexture', 'fontMood'].forEach(id => {
      document.getElementById(id).addEventListener('input', generatePrompt);
      document.getElementById(id).addEventListener('change', generatePrompt);
    });

    generatePrompt();
  </script>
</body>
</html>
